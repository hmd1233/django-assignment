{% extends "onlinecourse/base.html" %}

{% block content %}
<div class="container">
  <h2>{{ course.name }}</h2>
  <p>{{ course.description }}</p>

  <h3>Lessons</h3>
  {% for lesson in course.lesson_set.all %}
    <div class="card mb-3">
      <div class="card-body">
        <h5 class="card-title">{{ lesson.title }}</h5>
        <p class="card-text">{{ lesson.content }}</p>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
